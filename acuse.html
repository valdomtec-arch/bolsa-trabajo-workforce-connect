<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acuse de Postulación Oficial - Workforce Connect</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8fba; margin: 0; padding: 20px; color: #0f1a2c; }
        .ticket { max-width: 550px; margin: 20px auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; border: 1px solid #e2e8f0; }
        .header { background-color: #0b1426; color: #38bdf8; padding: 25px; text-align: center; border-bottom: 4px solid #f97316; }
        .header h1 { margin: 0; font-size: 1.6rem; letter-spacing: 1px; }
        .header p { margin: 5px 0 0; color: #fff; font-size: 0.9rem; opacity: 0.8; }
        .content { padding: 30px; }
        .title { text-align: center; font-weight: bold; font-size: 1.2rem; color: #0f1a2c; margin-bottom: 25px; text-transform: uppercase; }
        .campo { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #edf2f7; font-size: 0.95rem; }
        .label { font-weight: bold; color: #64748b; text-transform: uppercase; font-size: 0.85rem; }
        .val { font-weight: 600; color: #0f1a2c; text-align: right; }
        .footer { background: #f8fafc; text-align: center; padding: 15px; font-size: 0.8rem; color: #94a3b8; font-style: italic; }
        .btn-print { display: block; width: calc(100% - 60px); margin: 0 auto 30px; background: #22c55e; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; text-align: center; text-decoration: none; }
        #loading { text-align: center; padding: 50px; font-weight: bold; color: #38bdf8; }
    </style>
</head>
<body>

<div id="loading">✨ Validando Folio Digital...</div>

<div class="ticket" id="acuseBox" style="display:none;">
    <div class="header">
        <h1 id="folioDoc">WF-000000</h1>
        <p>WORKFORCE CONNECT SOLUTION</p>
    </div>
    <div class="content">
        <div class="title">Comprobante de Postulación</div>
        <div class="campo"><span class="label">Puesto:</span><span class="val" id="puesto">—</span></div>
        <div class="campo"><span class="label">Empresa:</span><span class="val" id="empresa">—</span></div>
        <div class="campo"><span class="label">Candidato:</span><span class="val" id="candidato">—</span></div>
        <div class="campo"><span class="label">CURP:</span><span class="val" id="curp">—</span></div>
        <div class="campo"><span class="label">Teléfono:</span><span class="val" id="tel">—</span></div>
        <div class="campo"><span class="label">Ruta Asignada:</span><span class="val" id="ruta">—</span></div>
        <div class="campo"><span class="label">Registro:</span><span class="val" id="fecha">—</span></div>
        <div class="campo"><span class="label">Asesor:</span><span class="val" id="asesor">—</span></div>
    </div>
    <a href="#" onclick="window.print(); return false;" class="btn-print">🖨️ Guardar o Imprimir Acuse</a>
    <div class="footer">Documento Oficial de Registro. Válido como pase de ingreso corporativo.</div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://bolsa-de-trabajo-workforce-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    
    const urlParams = new URLSearchParams(window.location.search);
    const idFolio = urlParams.get('folio');

    if(idFolio) {
        firebase.database().ref(`postulantes/${idFolio}`).once('value', function(snap) {
            if(snap.exists()) {
                const d = snap.val();
                document.getElementById('folioDoc').innerText = `FOLIO: ${d.id}`;
                document.getElementById('puesto').innerText = d.puesto.toUpperCase();
                document.getElementById('empresa').innerText = d.empresa.toUpperCase();
                document.getElementById('candidato').innerText = d.nombre.toUpperCase();
                document.getElementById('curp').innerText = d.curp;
                document.getElementById('tel').innerText = d.telefono;
                document.getElementById('ruta').innerText = d.rutaTransporteSeleccionada.toUpperCase();
                document.getElementById('fecha').innerText = d.fechaRegistro;
                document.getElementById('asesor').innerText = d.atendidoPor.toUpperCase();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('acuseBox').style.display = 'block';
            } else {
                document.getElementById('loading').innerText = "❌ Folio digital no encontrado en el sistema.";
            }
        });
    } else {
        document.getElementById('loading').innerText = "❌ Falta el parámetro de validación.";
    }
</script>
</body>
</html>
