<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de Trabajo - Detalles de la Vacante</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary-blue: #0284c7;
            --secondary-teal: #0d9488;
            --bg-page: #050b14;
            --container-bg: #111e30;
            --card-bg: #18273c;
            --white: #ffffff;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #243854;
            --blue-accent: #38bdf8;
            --orange-title: #f97316;
            --green-whatsapp: #25D366;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-page);
            color: var(--text-light);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 20px;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .container {
            max-width: 750px; width: 100%;
            background-color: var(--container-bg);
            padding: 30px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--blue-accent); text-decoration: none;
            font-weight: 600; margin-bottom: 20px; transition: opacity 0.2s;
        }
        .back-link:hover { opacity: 0.8; }
        h1 { color: var(--orange-title); margin-top: 0; font-size: 2rem; }
        .empresa-nombre { color: var(--blue-accent); font-size: 1.2rem; font-weight: 600; margin-top: -10px; margin-bottom: 25px; }
        
        .info-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }
        .info-card {
            background-color: var(--card-bg); padding: 15px; border-radius: 8px;
            border-left: 4px solid var(--primary-blue);
        }
        .info-card.orange { border-left-color: var(--orange-title); }
        .info-card label { display: block; font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .info-card span { font-size: 1.05rem; font-weight: 700; }
        
        .section-block {
            background-color: var(--card-bg); padding: 20px; border-radius: 8px;
            margin-bottom: 25px; border: 1px solid var(--border-color);
        }
        .section-block h3 { margin-top: 0; color: var(--blue-accent); font-size: 1.15rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .section-block p { margin-bottom: 0; white-space: pre-line; line-height: 1.5; color: #cbd5e1; }
        
        .form-postulacion {
            background: linear-gradient(145deg, #13253e, #111e30);
            padding: 25px; border-radius: 12px; border: 2px solid var(--primary-blue); margin-top: 35px;
        }
        .form-postulacion h3 { margin-top: 0; color: var(--white); font-size: 1.3rem; text-align: center; margin-bottom: 20px; }
        .fg { display: flex; flex-direction: column; margin-bottom: 15px; }
        .fg label { margin-bottom: 6px; font-size: 0.9rem; font-weight: 600; color: var(--text-light); }
        .fg input {
            padding: 12px; border-radius: 6px; border: 1px solid var(--border-color);
            background-color: var(--bg-page); color: var(--white); font-size: 1rem; outline: none;
        }
        .fg input:focus { border-color: var(--blue-accent); }
        
        .btn-submit {
            width: 100%; padding: 15px; border: none; border-radius: 6px;
            background-color: var(--primary-blue); color: var(--white);
            font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px;
        }
        .btn-submit:hover { background-color: #0274ae; }
        
        .error-container { text-align: center; padding: 40px 20px; }
        .error-container i { font-size: 3.5rem; color: #ef4444; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver a la Bolsa de Trabajo</a>
    
    <div id="loadingView" style="text-align: center; padding: 40px 0;">
        <i class="fas fa-spinner fa-spin" style="font-size: 2.5rem; color: var(--blue-accent); margin-bottom: 15px;"></i>
        <p>Cargando los detalles oficiales de la vacante...</p>
    </div>

    <div id="contentView" style="display: none;">
        <h1 id="puestoTitulo">---</h1>
        <div class="empresa-nombre" id="empresaNombre">---</div>
        
        <div class="info-grid">
            <div class="info-card">
                <label><i class="fas fa-money-bill-wave"></i> Sueldo Mensual</label>
                <span id="puestoSueldo">---</span>
            </div>
            <div class="info-card">
                <label><i class="fas fa-clock"></i> Horario / Turno</label>
                <span id="puestoTurno">---</span>
            </div>
            <div class="info-card orange">
                <label><i class="fas fa-map-marker-alt"></i> Ubicación</label>
                <span id="puestoUbicacion">---</span>
            </div>
        </div>

        <div class="section-block" id="bloqueRequisitos">
            <h3><i class="fas fa-list-ul"></i> Requisitos del Puesto</h3>
            <p id="puestoRequisitos">---</p>
        </div>

        <div class="section-block" id="bloqueBeneficios">
            <h3><i class="fas fa-gift"></i> Prestaciones y Beneficios</h3>
            <p id="puestoBeneficios">---</p>
        </div>

        <div class="section-block" id="bloqueNotas">
            <h3><i class="fas fa-info-circle"></i> Información General / Notas</h3>
            <p id="puestoNotas">---</p>
        </div>

        <form class="form-postulacion" id="formPostulacion" onsubmit="enviarPostulacion(event)">
            <h3><i class="fas fa-user-check"></i> Postulación Express con CURP</h3>
            <div class="fg">
                <label>Nombre Completo</label>
                <input type="text" id="postNombre" required placeholder="Introduce tu nombre y apellidos" autocomplete="off">
            </div>
            <div class="fg">
                <label>Teléfono de Contacto (WhatsApp)</label>
                <input type="tel" id="postTelefono" required maxlength="10" placeholder="Ej: 6461234567" autocomplete="off">
            </div>
            <div class="fg">
                <label>Clave CURP (18 caracteres oficiales)</label>
                <input type="text" id="postCurp" required maxlength="18" placeholder="Introduce tu CURP para validación" autocomplete="off" style="text-transform: uppercase;">
            </div>
            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane"></i> Confirmar Postulación y Enviar Folio
            </button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, update, increment, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://bolsa-de-trabajo-a52e4-default-rtdb.firebaseio.com/"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const empresaId = urlParams.get('empresa');
    const vacanteId = urlParams.get('id');

    let datosVacanteGlobal = null;
    let datosEmpresaGlobal = null;

    if (!empresaId || !vacanteId) {
        mostrarErrorPantalla("La ruta de acceso a la vacante es incorrecta o no tiene los parámetros requeridos.");
    } else {
        cargarInformacionEstructural();
    }

    async function cargarInformacionEstructural() {
        try {
            const empresaSnap = await get(ref(db, `empresas/${empresaId}`));
            const vacanteSnap = await get(ref(db, `vacantes_detalles/${empresaId}/${vacanteId}`));

            if (!empresaSnap.exists() || !vacanteSnap.exists()) {
                mostrarErrorPantalla("La vacante solicitada ya no se encuentra disponible o fue dada de baja del sistema.");
                return;
            }

            datosEmpresaGlobal = empresaSnap.val();
            datosVacanteGlobal = vacanteSnap.val();

            // Renderizar Información en la Interfaz
            document.getElementById('puestoTitulo').textContent = datosVacanteGlobal.vacanteNombre || 'Puesto Operativo';
            document.getElementById('empresaNombre').textContent = datosEmpresaGlobal.nombre || 'Empresa Afiliada';
            document.getElementById('puestoSueldo').textContent = datosVacanteGlobal.salario || 'No especificado';
            document.getElementById('puestoTurno').textContent = datosVacanteGlobal.turnos || 'A convenir';
            document.getElementById('puestoUbicacion').textContent = datosEmpresaGlobal.ubicacion || 'N/A';
            document.getElementById('puestoRequisitos').textContent = datosVacanteGlobal.requisitos || 'Se darán detalles en la entrevista presencial.';
            
            // Renderizado de las nuevas llaves dinámicas
            document.getElementById('puestoBeneficios').textContent = datosVacanteGlobal.beneficios || 'Prestaciones de ley correspondientes.';
            document.getElementById('puestoNotas').textContent = datosVacanteGlobal.informacionGeneral || 'Sin comentarios adicionales.';

            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('contentView').style.display = 'block';

            // --- CONTADOR DE VISITAS INTELIGENTE (Solucionado con runTransaction y sessionStorage) ---
            if (!sessionStorage.getItem(`visita_vacante_${vacanteId}`)) {
                const visitasRef = ref(db, `vacantes_detalles/${empresaId}/${vacanteId}/visitas`);
                runTransaction(visitasRef, (currentValue) => {
                    return (currentValue || 0) + 1;
                }).then(() => {
                    sessionStorage.setItem(`visita_vacante_${vacanteId}`, 'true');
                    console.log("📈 Contador de visitas actualizado de forma segura.");
                }).catch(e => console.error("Error al registrar la métrica de visita:", e));
            }

        } catch (error) {
            console.error(error);
            mostrarErrorPantalla("Ocurrió un inconveniente técnico al intentar conectar con la base de datos distribuida.");
        }
    }

    function extraerDatosCurp(curpVal) {
        const curpClean = curpVal.trim().toUpperCase();
        if (curpClean.length < 10) return { edad: "N/A", sexo: "N/A" };
        
        let anioDigitos = curpClean.substring(4, 6);
        let mesDigitos = curpClean.substring(6, 8);
        let diaDigitos = curpClean.substring(8, 10);
        let sexoLetra = curpClean.charAt(10);
        
        let siglo = 1900;
        if (parseInt(anioDigitos) < 30) siglo = 2000;
        
        let anioCompleto = siglo + parseInt(anioDigitos);
        let fechaNac = new Date(anioCompleto, parseInt(mesDigitos) - 1, parseInt(diaDigitos));
        let hoy = new Date();
        
        let edadCalculada = hoy.getFullYear() - fechaNac.getFullYear();
        let m = hoy.getMonth() - fechaNac.getMonth();
        if (m < 0 || (m === 0 && hoy.getDate() < fechaNac.getDate())) {
            edadCalculada--;
        }
        
        let sexoFormato = "Desconocido";
        if (sexoLetra === 'H') sexoFormato = "Masculino";
        if (sexoLetra === 'M') sexoFormato = "Femenino";
        
        return { edad: edadCalculada, sexo: sexoFormato };
    }

    window.enviarPostulacion = async function(e) {
        e.preventDefault();
        
        if (!datosVacanteGlobal || !datosEmpresaGlobal) {
            alert("Los datos estructurales no se han cargado por completo. Intenta de nuevo.");
            return;
        }

        const nombre = document.getElementById('postNombre').value.trim();
        const telefono = document.getElementById('postTelefono').value.trim();
        const curp = document.getElementById('postCurp').value.trim().toUpperCase();
        
        if (curp.length !== 18) {
            alert("La clave única de registro de población (CURP) debe tener obligatoriamente 18 caracteres.");
            return;
        }
        if (telefono.length !== 10) {
            alert("El número telefónico debe constar de exactamente 10 dígitos numéricos.");
            return;
        }

        const datosExtraidos = extraerDatosCurp(curp);
        const timestampId = "folio-" + Date.now();
        
        const payloadPostulante = {
            id: timestampId,
            nombreCompleto: nombre,
            telefono: telefono,
            curp: curp,
            edad: datosExtraidos.edad,
            genero: datosExtraidos.sexo,
            empresaDestino: empresaId,
            puesto: datosVacanteGlobal.vacanteNombre || 'Operador',
            fechaRegistro: new Date().toLocaleString()
        };

        try {
            // Guardar en la rama 'postulantes' en Firebase
            await set(ref(db, `postulantes/${timestampId}`), payloadPostulante);
            
            // Incrementar de forma atómica el total de postulantes registrados
            await update(ref(db, 'postulantes_count'), { total: increment(1) });

            alert("✅ ¡Tus datos se registraron correctamente!\n\nGenerando acuse en PDF y redirigiéndote al WhatsApp del reclutador para agendar tu entrevista...");

            // --- 1. GENERACIÓN DEL ARCHIVO PDF DE ACUSE ---
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Encabezado Corporativo
            doc.setFillColor(15, 42, 74); 
            doc.rect(0, 0, 210, 40, 'F');
            
            doc.setTextColor(56, 189, 248); 
            doc.setFont("Helvetica", "bold");
            doc.setFontSize(22);
            doc.text("WORKFORCE CONNECT", 15, 26);
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.setFont("Helvetica", "normal");
            doc.text("COMPROBANTE DE POSTULACIÓN OFICIAL", 125, 25);

            // Bloque 1: Datos Personales
            doc.setTextColor(33, 33, 33);
            doc.setFontSize(14);
            doc.setFont("Helvetica", "bold");
            doc.text("Datos Generales del Candidato", 15, 55);
            doc.setLineWidth(0.5); doc.setDrawColor(210, 210, 210); doc.line(15, 58, 195, 58);

            doc.setFontSize(11); doc.setFont("Helvetica", "normal");
            doc.text(`Folio Interno: ${timestampId}`, 15, 67);
            doc.text(`Nombre Completo: ${nombre}`, 15, 75);
            doc.text(`CURP Validada: ${curp}`, 15, 83);
            doc.text(`Teléfono: ${telefono}`, 15, 91);
            doc.text(`Edad calculada: ${datosExtraidos.edad} años (${datosExtraidos.sexo})`, 15, 99);

            // Bloque 2: Información Vacante
            doc.setFont("Helvetica", "bold"); doc.setFontSize(14);
            doc.text("Información del Puesto Solicitado", 15, 115);
            doc.line(15, 118, 195, 118);

            doc.setFontSize(11); doc.setFont("Helvetica", "normal");
            doc.text(`Empresa: ${datosEmpresaGlobal.nombre}`, 15, 127);
            doc.text(`Puesto: ${datosVacanteGlobal.vacanteNombre}`, 15, 135);
            doc.text(`Sueldo Base Ofrecido: ${datosVacanteGlobal.salario || 'No especificado'}`, 15, 143);
            doc.text(`Horario/Turno: ${datosVacanteGlobal.turnos || 'A convenir'}`, 15, 151);
            doc.text(`Ubicación de Trabajo: ${datosEmpresaGlobal.ubicacion}`, 15, 159);

            // Pie de página institucional
            doc.setFillColor(241, 245, 249);
            doc.rect(15, 175, 180, 25, 'F');
            doc.setTextColor(15, 42, 74); doc.setFont("Helvetica", "bold"); doc.setFontSize(9);
            doc.text("Nota de seguridad institucional:", 20, 182);
            doc.setFont("Helvetica", "normal");
            doc.text("Conserva este acuse digital. Tu perfil ya se encuentra respaldado y blindado en el sistema.", 20, 188);
            doc.text("Presenta este folio digital ante el reclutador al iniciar tu proceso de validación presencial.", 20, 194);

            doc.save(`Comprobante_${nombre.replace(/\s+/g, '_')}.pdf`);

            // --- 2. INTEGRACIÓN: ENVÍO DE DATOS POR WHATSAPP AL RECLUTADOR ---
            const telefonoReclutador = "526461974763";
            
            const mensajeWhatsApp = `¡Hola! Me acabo de postular a una vacante desde el sitio oficial.\n\n` +
                                    `*📌 Detalles de mi Postulación:*\n` +
                                    `• *Folio Único:* ${timestampId}\n` +
                                    `• *Puesto:* ${datosVacanteGlobal.vacanteNombre}\n` +
                                    `• *Empresa:* ${datosEmpresaGlobal.nombre}\n\n` +
                                    `*👤 Mis Datos del Formulario:*\n` +
                                    `• *Nombre:* ${nombre}\n` +
                                    `• *Teléfono:* ${telefono}\n` +
                                    `• *CURP:* ${curp}\n` +
                                    `• *Edad:* ${datosExtraidos.edad} años\n` +
                                    `• *Sexo:* ${datosExtraidos.sexo}\n\n` +
                                    `_Nota: Ya descargué mi acuse digital en formato PDF. Quedo a la espera de sus indicaciones para agendar mi entrevista._`;

            // Reseteamos el formulario limpio
            document.getElementById('formPostulacion').reset();

            // Redirección inmediata sin perder el PDF
            const urlWhatsApp = `https://api.whatsapp.com/send?phone=${telefonoReclutador}&text=${encodeURIComponent(mensajeWhatsApp)}`;
            window.location.href = urlWhatsApp;

        } catch (err) {
            console.error(err);
            alert("❌ Excepción en la base de datos de registro: " + err.message);
        }
    };

    function mostrarErrorPantalla(msg) {
        document.getElementById('mainContainer').innerHTML = `
            <div class="error-container">
                <i class="fas fa-exclamation-triangle"></i>
                <h2>Inconveniente de Acceso</h2>
                <p style="color: var(--text-muted); font-size: 1.05rem; margin-bottom: 25px;">${msg}</p>
                <a href="index.html" class="back-link" style="margin-bottom:0;"><i class="fas fa-arrow-left"></i> Regresar al Inicio</a>
            </div>
        `;
    }
</script>
</body>
</html>
