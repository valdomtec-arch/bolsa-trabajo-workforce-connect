<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de Trabajo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary-blue: #0284c7;
            --secondary-teal: #0d9488;
            --bg-page: #050b14;
            --container-bg: #111e30;
            --card-bg: #18273c;
            --white: #ffffff;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #243854;
            --blue-accent: #38bdf8;
            --orange-title: #f97316;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-page);
            color: var(--text-light);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px 10px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background-color: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        #loading {
            text-align: center;
            padding: 20px;
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .empresa-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .empresa-header h1 {
            color: var(--white);
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .empresa-header .location {
            color: var(--text-muted);
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        /* --- CARRUSEL ORIGINAL --- */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 220px;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .carousel-slide {
            display: none;
            width: 100%;
            height: 100%;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 1.1rem;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .carousel-btn:hover { background: var(--primary-blue); }
        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }

        /* --- BOTONES DE EMPRESAS / PUESTOS ORIGINALES --- */
        .menu-titulo {
            font-size: 1.1rem;
            color: var(--white);
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .vacantes-lista {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }
        
        .btn-puesto {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-puesto:hover {
            border-color: var(--primary-blue);
            background-color: #1f314d;
        }

        .btn-puesto span.salario-tag {
            font-size: 0.85rem;
            color: var(--secondary-teal);
            font-weight: normal;
        }

        /* --- DETALLES DE VACANTE --- */
        .btn-regresar {
            background: none;
            border: none;
            color: var(--blue-accent);
            cursor: pointer;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0;
            margin-bottom: 15px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .card h3 {
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid-detalles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .detalle-item {
            background: #142238;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .detalle-item strong {
            display: block;
            font-size: 0.75rem;
            color: var(--blue-accent);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .texto-bloque { white-space: pre-wrap; font-size: 0.95rem; line-height: 1.6; color: #cbd5e1; }
        
        /* --- FORMULARIOS --- */
        .btn {
            background-color: var(--secondary-teal);
            color: var(--white);
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn:hover { background-color: #0b7a6f; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.88rem; color: var(--text-muted); }
        
        input, select {
            width: 100%;
            padding: 12px;
            background-color: #1d2e47;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }

        /* --- ACCESO ADMINISTRATIVO TRADICIONAL Y FORMULARIO --- */
        .admin-section {
            margin-top: 35px;
            border-top: 2px dashed var(--border-color);
            padding-top: 20px;
        }

        .admin-toggle-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            display: block;
            margin: 0 auto 15px auto;
            text-decoration: underline;
        }

        .admin-toggle-btn:hover { color: var(--blue-accent); }
    </style>
</head>
<body>

<div class="container">
    <div id="loading"><i class="fas fa-spinner fa-spin"></i> Cargando datos...</div>
    
    <!-- HEADER -->
    <div id="empresaHeaderBox" class="empresa-header" style="display: none;">
        <h1 id="mainEmpresaNombre">Portal de Vacantes</h1>
        <div class="location"><i class="fa-solid fa-location-dot"></i> <span id="mainEmpresaLugar">—</span></div>
    </div>

    <!-- CARRUSEL ORIGINAL -->
    <div class="carousel-container" id="empresaCarouselBox" style="display: none;">
        <div class="carousel-slide"><img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=800" alt="Ubicación 1"></div>
        <div class="carousel-slide"><img src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=800" alt="Ubicación 2"></div>
        <div class="carousel-slide"><img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?q=80&w=800" alt="Ubicación 3"></div>
        <button class="carousel-btn prev" onclick="cambiarSlide(-1)">&#10094;</button>
        <button class="carousel-btn next" onclick="cambiarSlide(1)">&#10095;</button>
    </div>

    <!-- LISTADO ORIGINAL POR EMPRESAS -->
    <div id="menuVacantesBox" style="display: none;">
        <div class="menu-titulo" id="lblMenuTitulo">Selecciona una opción:</div>
        <div id="listaVacantesDinamica" class="vacantes-lista"></div>
    </div>

    <!-- DETALLES DE LA VACANTE SELECCIONADA -->
    <div id="content" style="display:none;">
        <button class="btn-regresar" onclick="regresarAlMenu()"><i class="fa-solid fa-arrow-left"></i> Volver al menú</button>
        <h1 id="vacanteTitulo" style="color: var(--white); font-size: 1.6rem; margin-bottom: 15px; text-transform: uppercase;">—</h1>
        
        <div class="grid-detalles">
            <div class="detalle-item"><strong>💰 Salario Ofrecido</strong><span id="detSalario">—</span></div>
            <div class="detalle-item"><strong>📍 Zona de Trabajo</strong><span id="detLugar">—</span></div>
            <div class="detalle-item"><strong>🕒 Horarios y Turnos</strong><span id="detTurnos">—</span></div>
            <div class="detalle-item"><strong>🔞 Edad Solicitada</strong><span id="detEdad">—</span></div>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-toolbox"></i> Actividades Principales</h3>
            <p id="vacanteActividades" class="texto-bloque">—</p>
        </div>

        <!-- FORMULARIO DE POSTULACIÓN EXPRÉS -->
        <div class="card" style="border-color: var(--primary-blue);">
            <h3><i class="fa-solid fa-id-card"></i> Formulario de Postulación</h3>
            <form id="formPostulacion" onsubmit="enviarPostulacion(event)">
                <div class="form-group"><label>Nombre Completo:</label><input type="text" id="postNombre" required></div>
                <div class="form-group"><label>Teléfono:</label><input type="tel" id="postTelefono" required></div>
                <div class="form-group"><label>CURP:</label><input type="text" id="postCurp" maxlength="18" style="text-transform: uppercase;" required></div>
                <button type="submit" class="btn"><i class="fa-solid fa-file-pdf"></i> Enviar Postulación</button>
            </form>
        </div>
    </div>

    <!-- MÓDULO ADMINISTRATIVO EXCLUSIVO -->
    <div class="admin-section">
        <button class="admin-toggle-btn" onclick="toggleAdminBox()"><i class="fas fa-lock"></i> Módulo de Reclutamiento (Acceso / Alta de Reclutadores)</button>
        
        <div id="adminMainBox" class="card" style="display: none; border-color: var(--orange-title);">
            <h3 style="color: var(--orange-title); margin-bottom: 15px;"><i class="fas fa-user-shield"></i> Control de Reclutadores</h3>
            
            <!-- Acceso Directo a admin.html -->
            <div style="margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color);">
                <label style="color: var(--white); font-weight: bold; margin-bottom: 8px;">🔑 Validar Credenciales para Entrar al Panel (admin.html)</label>
                <div style="display: flex; gap: 8px;">
                    <input type="password" id="passAdminHTML" placeholder="Introduce tu Código de Reclutador o Clave Maestra">
                    <button class="btn" style="width: auto; padding: 0 20px; background: #e11d48;" onclick="accederAdminHTML()">Ingresar</button>
                </div>
            </div>

            <!-- Formulario de Alta de Reclutadores Nuevos -->
            <form id="formAltaReclutador" onsubmit="registrarReclutadorNuevo(event)">
                <label style="color: var(--white); font-weight: bold; margin-bottom: 12px;"><i class="fas fa-user-plus"></i> Registrar y Dar de Alta Nuevo Reclutador</label>
                
                <div class="form-group">
                    <label>Nombre Completo del Reclutador:</label>
                    <input type="text" id="altaNombre" placeholder="Ej: Carlos Mendoza" required>
                </div>
                <div class="form-group">
                    <label>Asignar Rol o Puesto:</label>
                    <input type="text" id="altaPuesto" placeholder="Ej: Reclutador Senior / Coordinador HR" required>
                </div>
                <div class="form-group">
                    <label>Crear Código Personal de Acceso (Contraseña):</label>
                    <input type="password" id="altaPass" placeholder="Contraseña para que el reclutador inicie sesión" required>
                </div>
                
                <button type="submit" class="btn" style="background-color: var(--primary-blue); margin-top: 5px;"><i class="fas fa-save"></i> Autorizar y Guardar en el Sistema</button>
            </form>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://bolsa-de-trabajo-workforce-default-rtdb.firebaseio.com/" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let todasLasVacantes = {};
    let datosVacanteGlobal = null;
    let slideIndex = 0;

    // Control del Carrusel
    window.cambiarSlide = function(n) {
        const slides = document.getElementsByClassName("carousel-slide");
        if (slides.length === 0) return;
        slides[slideIndex].style.display = "none";
        slideIndex += n;
        if (slideIndex >= slides.length) slideIndex = 0;
        if (slideIndex < 0) slideIndex = slides.length - 1;
        slides[slideIndex].style.display = "block";
    }

    function iniciarCarrusel() {
        const slides = document.getElementsByClassName("carousel-slide");
        if (slides.length > 0) {
            slides[0].style.display = "block";
            setInterval(() => cambiarSlide(1), 5000);
        }
    }

    window.toggleAdminBox = function() {
        const box = document.getElementById('adminMainBox');
        box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }

    // Validación Dinámica de Reclutadores para saltar a admin.html
    window.accederAdminHTML = async function() {
        const passIngresada = document.getElementById('passAdminHTML').value.trim();
        
        if (!passIngresada) return alert("Por favor escribe tu contraseña o código.");

        // Opción 1: Llaves maestras por defecto
        if (passIngresada === "valdomtec" || passIngresada === "admin123") {
            window.location.href = "admin.html";
            return;
        }

        // Opción 2: Validar contra los reclutadores dados de alta en Firebase
        try {
            const reclutadoresRef = ref(db, 'reclutadores_autorizados');
            const snapshot = await get(reclutadoresRef);
            
            let accesoValido = false;

            if (snapshot.exists()) {
                const listaReclutadores = snapshot.val();
                for (let key in listaReclutadores) {
                    if (listaReclutadores[key].clave === passIngresada) {
                        accesoValido = true;
                        break;
                    }
                }
            }

            if (accesoValido) {
                window.location.href = "admin.html";
            } else {
                alert("❌ Código de Reclutador inválido o no registrado.");
            }
        } catch (error) {
            alert("Error al verificar credenciales con el servidor.");
        }
    }

    // Registro Real y validación en Firebase de los Reclutadores
    window.registrarReclutadorNuevo = async function(e) {
        e.preventDefault();
        const nombre = document.getElementById('altaNombre').value.trim();
        const puesto = document.getElementById('altaPuesto').value.trim();
        const pass = document.getElementById('altaPass').value.trim();
        const reclutadorId = "rec-" + Date.now();

        try {
            // Guardamos el perfil completo en una base estructurada
            await set(ref(db, `reclutadores_autorizados/${reclutadorId}`), {
                id: reclutadorId,
                nombreCompleto: nombre,
                puesto: puesto,
                clave: pass,
                fechaRegistro: new Date().toLocaleString()
            });

            alert(`¡Reclutador "${nombre}" dado de alta con éxito!\nYa puede ingresar usando su clave personal.`);
            document.getElementById('formAltaReclutador').reset();
        } catch (err) {
            alert("❌ Error al guardar el reclutador: " + err.message);
        }
    }

    async function cargarPortalOriginal() {
        document.getElementById('empresaCarouselBox').style.display = 'block';
        iniciarCarrusel();

        try {
            const todasRef = ref(db, 'vacantes_detalles');
            const snapshot = await get(todasRef);

            if (snapshot.exists()) {
                todasLasVacantes = snapshot.val();
                document.getElementById('empresaHeaderBox').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                renderizarBotonesEmpresa(Object.keys(todasLasVacantes));
                document.getElementById('menuVacantesBox').style.display = 'block';
            } else {
                document.getElementById('loading').innerText = "No hay registros disponibles.";
            }
        } catch (e) {
            document.getElementById('loading').innerText = "Error de conexión.";
        }
    }

    function renderizarBotonesEmpresa(empresas) {
        const contenedor = document.getElementById('listaVacantesDinamica');
        contenedor.innerHTML = '';
        
        empresas.forEach(emp => {
            const btn = document.createElement('button');
            btn.className = 'btn-puesto';
            btn.onclick = () => verVacantesDeEmpresa(emp);
            btn.innerHTML = `
                <span><i class="fa-solid fa-building"></i> ${emp.toUpperCase()}</span>
                <span class="salario-tag">Ver Convocatoria <i class="fa-solid fa-chevron-right"></i></span>
            `;
            contenedor.appendChild(btn);
        });
    }

    function verVacantesDeEmpresa(empKey) {
        const nodo = todasLasVacantes[empKey];
        let subKey = Object.keys(nodo)[0];
        let data = nodo[subKey] || nodo;
        
        datosVacanteGlobal = data;
        document.getElementById('menuVacantesBox').style.display = 'none';
        
        document.getElementById('vacanteTitulo').innerText = data.vacanteNombre || 'Puesto General';
        document.getElementById('detSalario').innerText = data.salario || 'No especificado';
        document.getElementById('detLugar').innerText = data.lugarOrigen || 'No especificado';
        document.getElementById('detTurnos').innerText = data.turnos || 'No especificado';
        document.getElementById('detEdad').innerText = data.edad || 'Indistinto';
        document.getElementById('vacanteActividades').innerText = data.actividades || 'No especificadas.';
        
        document.getElementById('content').style.display = 'block';
    }

    window.regresarAlMenu = function() {
        document.getElementById('content').style.display = 'none';
        document.getElementById('menuVacantesBox').style.display = 'block';
    }

    window.enviarPostulacion = async function(e) {
        e.preventDefault();
        alert("¡Postulación procesada con éxito!");
    }

    window.onload = cargarPortalOriginal;
</script>
</body>
</html>
